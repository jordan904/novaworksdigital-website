  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #000;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, rgba(139, 92, 246, 0.12) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      bottom: -300px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(109, 40, 217, 0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }

    .socials-page {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 480px;
      padding: 48px 24px 64px;
      margin: 0 auto;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #a0a0a0;
      text-decoration: none;
      margin-bottom: 32px;
      transition: color 0.3s ease;
    }

    .back-link:hover {
      color: #a78bfa;
    }

    /* Profile header */
    .profile {
      text-align: center;
      margin-bottom: 40px;
    }

    .profile-logo {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      margin: 0 auto 20px;
      box-shadow: 0 0 40px rgba(139, 92, 246, 0.3), 0 0 80px rgba(139, 92, 246, 0.1);
      overflow: hidden;
    }

    .profile-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .profile h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .profile p {
      font-size: 0.9rem;
      color: #a0a0a0;
      line-height: 1.6;
    }

    /* Social icon row */
    .social-icons {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-bottom: 36px;
      flex-wrap: wrap;
    }

    .social-icon-circle {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(139, 92, 246, 0.1);
      border: 1px solid rgba(139, 92, 246, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .social-icon-circle:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.4);
      transform: translateY(-2px);
    }

    .social-icon-circle svg {
      width: 18px;
      height: 18px;
      fill: #a78bfa;
    }

    /* Link cards */
    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .link-card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 16px 20px;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.4), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .link-card:hover {
      background: #1a1a1a;
      border-color: rgba(139, 92, 246, 0.25);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(139, 92, 246, 0.1);
    }

    .link-card:hover::before {
      opacity: 1;
    }

    .link-icon {
      width: 44px;
      height: 44px;
      flex-shrink: 0;
      background: rgba(139, 92, 246, 0.08);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .link-icon svg {
      width: 22px;
      height: 22px;
      fill: #a78bfa;
    }

    .link-icon-stroke svg {
      fill: none;
      stroke: #a78bfa;
      stroke-width: 1.75;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .link-text {
      flex: 1;
      min-width: 0;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      overflow-wrap: break-word;
    }

    .link-arrow {
      color: #666;
      transition: color 0.3s ease, transform 0.3s ease;
      flex-shrink: 0;
    }

    .link-card:hover .link-arrow {
      color: #a78bfa;
      transform: translateX(3px);
    }

    .link-arrow svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* Footer */
    .socials-footer {
      text-align: center;
      margin-top: 48px;
      font-size: 0.75rem;
      color: #444;
    }

    /* Animations */
    @media (prefers-reduced-motion: no-preference) {
      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(20px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes pulseGlow {
        0%, 100% { box-shadow: 0 0 40px rgba(139, 92, 246, 0.3), 0 0 80px rgba(139, 92, 246, 0.1); }
        50% { box-shadow: 0 0 60px rgba(139, 92, 246, 0.5), 0 0 120px rgba(139, 92, 246, 0.2); }
      }

      @keyframes float {
        0%, 100% { transform: translateX(-50%) translateY(0); }
        50% { transform: translateX(-50%) translateY(-20px); }
      }

      @keyframes shimmer {
        0% { left: -100%; }
        100% { left: 200%; }
      }

      /* Floating ambient glows */
      body::before {
        animation: float 8s ease-in-out infinite;
      }

      body::after {
        animation: float 10s ease-in-out infinite reverse;
      }

      /* Pulsing logo */
      .profile-logo {
        animation: pulseGlow 3s ease-in-out infinite;
      }

      /* Shimmer on link cards */
      .link-card::after {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 60%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(139, 92, 246, 0.06), transparent);
        pointer-events: none;
      }

      .link-card:hover::after {
        animation: shimmer 0.8s ease forwards;
      }

      /* Entrance animations */
      .back-link { animation: fadeUp 0.4s ease forwards; opacity: 0; }
      .profile { animation: fadeUp 0.6s ease 0.1s forwards; opacity: 0; }
      .social-icons { animation: fadeUp 0.5s ease 0.25s forwards; opacity: 0; }
      .link-card:nth-child(1) { animation: fadeUp 0.4s ease 0.35s forwards; opacity: 0; }
      .link-card:nth-child(2) { animation: fadeUp 0.4s ease 0.42s forwards; opacity: 0; }
      .link-card:nth-child(3) { animation: fadeUp 0.4s ease 0.49s forwards; opacity: 0; }
      .link-card:nth-child(4) { animation: fadeUp 0.4s ease 0.56s forwards; opacity: 0; }
      .link-card:nth-child(5) { animation: fadeUp 0.4s ease 0.63s forwards; opacity: 0; }
      .link-card:nth-child(6) { animation: fadeUp 0.4s ease 0.7s forwards; opacity: 0; }
      .link-card:nth-child(7) { animation: fadeUp 0.4s ease 0.77s forwards; opacity: 0; }
      .link-card:nth-child(8) { animation: fadeUp 0.4s ease 0.84s forwards; opacity: 0; }
      .socials-footer { animation: fadeUp 0.4s ease 0.92s forwards; opacity: 0; }
    }

    /* ===== MOBILE RESPONSIVE ===== */
    @media (max-width: 480px) {
      body {

        align-items: flex-start;

      }

      }

        margin-bottom: 28px;
      }

      .social-icon-circle {
        width: 40px;
        height: 40px;
      }

      .social-icon-circle svg {
        width: 16px;
        height: 16px;
      }

      .links {
        gap: 10px;
      }

      .link-card {
        padding: 14px 16px;
        gap: 12px;
      }

      .link-icon {
        width: 40px;
        height: 40px;
      }

      .link-icon svg {

      }

      .link-text {

      }

      .back-link {
        margin-bottom: 24px;
      }

      .profile {

      }
    }

    /* Smaller phones */
    @media (max-width: 360px) {

      }

        height: 36px;
      }

      .link-icon svg {

        height: 18px;
      }

      .link-text {
        font-size: 0.825rem;
      }
    }
